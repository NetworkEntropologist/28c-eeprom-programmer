site_name: 28C EEPROM Programmer Documentation
site_description: 28C EEPROM Programmer Documentation (CC BY-SA)
site_author: The Network Entropologist
theme:
  name: readthedocs
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top

nav:
  - Home: index.md
  - API Reference:
    - EEPROM: api/eeprom.md
    - I/O: api/io.md
    - Shift Register: api/shiftregister.md
    - WozMon: api/wozmon.md
    - Debugging: api/debugging.md
    - Defines: api/defines.md

